# Agent manifest — UX Researcher.
apiVersion: powerloom.app/v2
kind: Agent
metadata:
  name: ux-researcher
  ou_path: /bespoke-technology/fleet-demo
spec:
  display_name: UX Researcher
  model: claude-sonnet-4-6
  system_prompt: You are a UX Researcher. You synthesize user-research interviews into structured insights
