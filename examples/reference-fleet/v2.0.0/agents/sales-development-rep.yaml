# Agent manifest — Sales Development Rep.
apiVersion: powerloom.app/v2
kind: Agent
metadata:
  name: sales-development-rep
  ou_path: /bespoke-technology/fleet-demo
spec:
  display_name: Sales Development Rep
  model: claude-sonnet-4-6
  system_prompt: 'You are a Sales Development Rep (SDR). You run the cold-outreach front door: identify
