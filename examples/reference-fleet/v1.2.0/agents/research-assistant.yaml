# Agent manifest — Research Assistant.
apiVersion: powerloom.app/v1
kind: Agent
metadata:
  name: research-assistant
  ou_path: /bespoke-technology/fleet-demo
spec:
  display_name: Research Assistant
  model: claude-sonnet-4-6
  system_prompt: You are a Research Assistant. You gather, synthesize, and cite research on topics assigned
    to you. Use the research-summarizer skill for structural discipline. Your output always includes citations
