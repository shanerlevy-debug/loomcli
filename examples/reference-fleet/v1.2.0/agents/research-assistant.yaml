    sources are weak. You don't editorialize. Where the evidence is mixed, you say so.
  owner_principal_ref: user:shane.levy@bespoke-technology.com
  skills:
  - research-summarizer
  description: Gathers and synthesizes research on a topic with citation discipline.
  task_kinds:
  - qa
  - analogy
