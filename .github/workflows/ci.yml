name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest packaging rich typer httpx pydantic pyyaml platformdirs jsonschema referencing websockets respx pytest-asyncio
        pip install -e .
        
    - name: Lint with ruff
      # Smoke-only: verify the lint config parses + the codebase has no
      # syntax errors. Full ruff cleanup (unused imports, type-comparison
      # idioms, module-level import positioning) is its own thread —
      # gating PRs on it would block every legitimate change with
      # pre-existing legacy noise.
      run: ruff check loomcli/ --select=E9,F63,F7,F82 --no-cache

    - name: Run unit tests
      run: pytest
