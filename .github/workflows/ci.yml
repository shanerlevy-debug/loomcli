name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest packaging rich typer httpx pydantic pyyaml platformdirs jsonschema referencing websockets respx pytest-asyncio
        pip install -e .
        
    - name: Lint with ruff
      run: ruff check loomcli/
      
    - name: Run unit tests
      run: pytest
