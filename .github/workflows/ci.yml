name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest packaging rich typer httpx pydantic pyyaml platformdirs jsonschema referencing websockets respx pytest-asyncio
        pip install -e .
        
    - name: Lint with ruff
      # Smoke-only: catch syntax errors (E9), bad escape (F63), and
      # tab/space mixing (F7). The full ruff default catches both
      # pre-existing style nits (unused imports, etc.) AND F821
      # undefined-name false-positives on legitimate forward-reference
      # patterns. Full ruff cleanup is its own thread.
      run: ruff check loomcli/ --select=E9,F63,F7 --no-cache

    - name: Run unit tests
      env:
        # GitHub Actions runners default to a narrow terminal which makes
        # rich/typer wrap --help output and hides flag names that the
        # tests assert on. 200 cols is wide enough that all flags render
        # on one line. NO_COLOR also strips ANSI so substring checks
        # work even when the test forgot to strip them locally.
        COLUMNS: "200"
        NO_COLOR: "1"
      run: pytest
