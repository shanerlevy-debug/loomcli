name: Publish loomcli to PyPI

# Builds the `loomcli` Python package and publishes to PyPI via
# OIDC Trusted Publishing (no API tokens needed).
#
# One-time setup on PyPI side (done by Shane):
#   1. https://pypi.org/manage/account/publishing/ -> "Add a new pending publisher"
#   2. PyPI Project Name: loomcli
#      Owner: shanerlevy-debug
#      Repository name: loomcli
#      Workflow name: publish.yml
#      Environment name: pypi
#   3. Save. First successful run creates the project on PyPI.
#
# Optional: repeat with environment `testpypi` on https://test.pypi.org
# to enable manual `workflow_dispatch target=testpypi` dry-runs.
#
# Triggers:
#   - push of a tag matching `v*.*.*` (production publish to PyPI)
#   - manual workflow_dispatch (TestPyPI dry-run publish for validation)
#
# Version discipline:
#   - Git tag `vX.Y.Z` MUST match `pyproject.toml` version exactly (the
#     preflight job fails the run otherwise). Keeps tag-as-source-of-truth.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # pre-release e.g. v0.3.0-rc1
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (version + schema bundle)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read pyproject version
        id: version
        run: |
          set -euo pipefail
          PYPROJECT_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=${PYPROJECT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pyproject.toml version: ${PYPROJECT_VERSION}"

      - name: Verify tag matches pyproject version (tag-triggered runs only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="${{ steps.version.outputs.version }}"
          if [ "${TAG_VERSION}" != "${PYPROJECT_VERSION}" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi
          echo "Tag and pyproject version match: ${PYPROJECT_VERSION}"

      - name: Verify JSON Schema bundle is present
        run: |
          set -euo pipefail
          if [ ! -f schema/v1/powerloom.v1.bundle.json ]; then
            echo "::error::schema/v1/powerloom.v1.bundle.json is missing."
            ls -la schema/ || true
            exit 1
          fi
          echo "Schema bundle present."

  build:
    name: Build wheel + sdist
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist + wheel
        run: |
          python -m build
          ls -la dist/

      - name: Smoke-test the built wheel (install + --version + --help)
        run: |
          set -euo pipefail
          python -m venv /tmp/weave-smoke
          /tmp/weave-smoke/bin/pip install --upgrade pip
          /tmp/weave-smoke/bin/pip install dist/loomcli-*.whl
          /tmp/weave-smoke/bin/weave --version
          /tmp/weave-smoke/bin/weave --help > /dev/null

      - name: Verify bundled schema is inside the wheel
        run: |
          set -euo pipefail
          python -m zipfile -l dist/loomcli-*.whl | grep -q "loomcli/_bundled_schema/v1/" || {
            echo "::error::Wheel is missing loomcli/_bundled_schema/v1/ — force-include likely misconfigured."
            exit 1
          }
          echo "Schema bundle present in wheel."

      - name: Upload dist/ as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI (manual dispatch, target=testpypi)
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/loomcli/
    permissions:
      id-token: write
    steps:
      - name: Download dist/ artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI (tag push or manual dispatch with target=pypi)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/loomcli/
    permissions:
      id-token: write
    steps:
      - name: Download dist/ artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
