# Reconciler daemon — operator-host docker-compose.
#
# Bring up:
#   docker compose -f deploy/reconciler/docker-compose.yml up -d
#
# Reads .env from the same directory (deploy/reconciler/.env). Required:
#   POWERLOOM_ACCESS_TOKEN=pat_xxx       — PAT from /settings/access-tokens
# Optional:
#   POWERLOOM_API_BASE_URL=https://...   — defaults to api.powerloom.org
#   POWERLOOM_AGENT=reconciler           — agent slug or UUID
#   RECONCILER_DRY_RUN=true              — append --dry-run to the daemon
#   RECONCILER_INTERVAL=10               — tick cadence in seconds
#   RECONCILER_CONFIDENCE=0.8            — action confidence threshold
#
# See ../docs/operating-self-hosted-agents.md (in the Powerloom repo)
# for the full operator runbook.
#
# Image is built locally from the Dockerfile alongside this file; no
# registry push needed for v1. If we ever want a published image,
# build + push to ghcr.io/shanerlevy-debug/powerloom-reconciler.

services:
  reconciler:
    container_name: powerloom-reconciler
    build:
      context: .
      dockerfile: Dockerfile
    image: powerloom-reconciler:local
    restart: unless-stopped
    # Foreground daemon; container's PID 1 is `weave agent run ...`.
    # Logs go to stdout/stderr; Docker captures them. Operator can
    # `docker logs -f powerloom-reconciler` or wire to journald via
    # the systemd unit (deploy/reconciler/powerloom-reconciler.service).
    environment:
      POWERLOOM_API_BASE_URL: "${POWERLOOM_API_BASE_URL:-https://api.powerloom.org}"
      POWERLOOM_ACCESS_TOKEN: "${POWERLOOM_ACCESS_TOKEN}"
      POWERLOOM_AGENT: "${POWERLOOM_AGENT:-reconciler}"
    # Default command runs the daemon foreground at the agent slug
    # specified above. To dry-run + exit (smoke test):
    #   docker compose run --rm reconciler weave agent run reconciler --dry-run --once
    # Operators wanting to add flags long-term should override the
    # `command:` here, not edit the Dockerfile.
    command:
      - sh
      - -c
      - >
        weave agent run "${POWERLOOM_AGENT:-reconciler}"
        --interval "${RECONCILER_INTERVAL:-10}"
        --confidence "${RECONCILER_CONFIDENCE:-0.8}"
        $${RECONCILER_DRY_RUN:+--dry-run}

# No volumes, no ports, no shared networks. The daemon authenticates
# via PAT (env var); HTTPS to the control plane goes out over the host's
# default network. Stateless between ticks.
