  # =======================================================================
  # T5 — Custom kind via compose operator (v2.0.0 only)
  # =======================================================================
  # T5 has NO condition-A counterpart; compose doesn't exist in v1.
  # Measurement on these tasks is informational (pass rate + output
  # quality) — they don't factor into the A-vs-B gate comparison.

  - id: T5-01
    task_type: T5
    v2_only: true
    description: |
      Create a Compose manifest that defines a new kind called
      'ContractClause' in namespace 'legal.acme'. The compose
      expression should use two primitive slots:
      - Entity (with attributes for clause_text and jurisdiction)
      - Policy (policy_type 'legal_constraint', applies_to
        a scope_ref named 'jurisdiction')
      apiVersion powerloom.app/v2.
    rubric:
      - "kind is Compose and metadata.name is ContractClause."
      - "metadata.namespace is legal.acme."
      - "spec.compose contains exactly 2 slots."
      - "The compose expression includes an Entity slot with clause_text attribute."
      - "The compose expression includes a Policy slot with policy_type legal_constraint."

  - id: T5-02
    task_type: T5
    v2_only: true
    description: |
      Compose manifest for kind 'CodeReviewSession', namespace
      'dev.acme'. Composition:
      - Process (process_kind = 'review_session')
      - list[Event] (implicit via derivation_mode extending the
        built-in Workflow stdlib) — actually, just extend the
        stdlib Workflow kind via `extends: Workflow`, then add a
        Scope slot (scope_type: 'session').
    rubric:
      - "kind is Compose and metadata.name is CodeReviewSession."
      - "metadata.namespace is dev.acme."
      - "spec.compose has at least one slot with extends: Workflow."
      - "There is a Scope slot with scope_type session or similar."
      - "apiVersion is powerloom.app/v2."

  - id: T5-03
    task_type: T5
    v2_only: true
    description: |
      Compose manifest 'IncidentRunbook' in namespace 'ops.acme'.
      Extend the stdlib Process kind (extends: Process) and add a
      Policy slot that requires runtime_type in the applies_to
      to be [cma, anthropic_messages].
    rubric:
      - "kind is Compose and metadata.name is IncidentRunbook."
      - "metadata.namespace is ops.acme."
      - "spec.compose has a slot with extends: Process."
      - "There is a Policy slot."
      - "apiVersion is powerloom.app/v2."

  - id: T5-04
    task_type: T5
    v2_only: true
    description: |
      Compose kind 'ClinicalProtocol' in namespace 'health.acme'.
      Uses three primitive slots:
      - Process (process_kind: 'clinical_protocol')
      - Policy (policy_type: 'treatment_rules')
      - Scope (scope_type: 'patient_cohort')
    rubric:
      - "kind is Compose and metadata.name is ClinicalProtocol."
      - "metadata.namespace is health.acme."
      - "spec.compose has exactly 3 slots."
      - "The three slots are Process, Policy, and Scope primitives."
      - "The Policy slot has policy_type treatment_rules or similar."

